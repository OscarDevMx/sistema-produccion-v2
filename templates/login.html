<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Inicio de Sesión | Sistema de Producción</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 1rem;
            box-sizing: border-box;
        }

        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            width: min(100%, 420px);
            max-width: 100%;
            margin: 0 auto;
        }

        .login-title {
            font-weight: 600;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }

        .form-control {
            border-radius: 10px;
            padding: 0.8rem 0.9rem;
            font-size: 1rem;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.2);
        }

        .btn-login {
            background-color: #007bff;
            color: white;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 0.8rem 1rem;
            width: 100%;
        }

        .btn-login:hover {
            background-color: #0056b3;
        }

        .alert {
            border-radius: 10px;
            font-size: 0.95rem;
        }

        @media (max-width: 480px) {
            body {
                padding: 0.75rem;
                align-items: flex-start;
                padding-top: max(0.75rem, env(safe-area-inset-top));
            }

            .login-card {
                padding: 1.25rem;
                border-radius: 14px;
            }

            .login-title {
                font-size: 1.35rem;
                margin-bottom: 1rem;
            }

            .form-label {
                font-size: 0.95rem;
            }

            .form-control {
                font-size: 16px;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 0.5rem;
            }

            .login-card {
                padding: 1rem;
            }

            .login-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="login-title">Inicio de Sesión</h3>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label for="nombre" class="form-label">Usuario</label>
                <input type="text" name="nombre" class="form-control" id="nombre" placeholder="Ingresa tu nombre" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" id="password" placeholder="Ingresa tu contraseña" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-login">Entrar</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
